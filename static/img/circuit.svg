<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none" stroke="#35c9a6" stroke-width="2.4" stroke-linecap="round">
  <!-- outer rail -->
  <rect x="16" y="16" width="88" height="88" rx="7"/>
  <!-- inner faint rail -->
  <rect x="23" y="23" width="74" height="74" rx="5" stroke-opacity=".3"/>

  <!-- corner pads (nodes) -->
  <g fill="#35c9a6" stroke="none">
    <circle cx="16" cy="16" r="4.5"/>
    <circle cx="104" cy="16" r="4.5"/>
    <circle cx="16" cy="104" r="4.5"/>
    <circle cx="104" cy="104" r="4.5"/>
  </g>

  <!-- corner stubs pointing outward -->
  <path d="M16 5 V16 M5 16 H16  M104 5 V16 M115 16 H104  M16 115 V104 M5 104 H16  M104 115 V104 M115 104 H104"/>
  <!-- inner branch traces near each corner -->
  <path stroke-opacity=".7" d="M16 30 H30 V16  M104 30 H90 V16  M16 90 H30 V104  M104 90 H90 V104"/>

  <!-- mid-edge ticks + vias (live in the edge slices -> tile evenly along each side) -->
  <path stroke-opacity=".75" d="M60 16 V9  M60 104 V111  M16 60 H9  M104 60 H111"/>
  <g fill="#35c9a6" stroke="none" fill-opacity=".8">
    <circle cx="60" cy="16" r="2"/>
    <circle cx="60" cy="104" r="2"/>
    <circle cx="16" cy="60" r="2"/>
    <circle cx="104" cy="60" r="2"/>
  </g>
</svg>
