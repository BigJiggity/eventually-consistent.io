baseURL = "https://www.eventually-consistent.io/"
languageCode = "en-us"
title = "Eventually Consistent"
theme = "PaperMod"

# Custom domain: when DNS for eventually-consistent.io points at GitHub Pages,
# set baseURL = "https://eventually-consistent.io/" and add a static/CNAME file
# containing that hostname. The CI build overrides baseURL with the Pages URL
# automatically, so this value only matters for local `hugo serve`.

enableRobotsTXT = true
enableEmoji = true
pygmentsUseClasses = true
paginate = 10

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON enables PaperMod search

[params]
  env = "production"
  description = "Writing on cryptography, distributed systems, infrastructure, and agentic tooling."
  author = "John Reed"
  keywords = ["cryptography", "zero-knowledge", "blockchain", "distributed systems", "infrastructure as code", "Terraform", "AWS", "Azure", "Claude Code", "AI-assisted development", "DevOps"]
  images = ["img/og-default.png"]   # default social-share card (OpenGraph + Twitter)
  defaultTheme = "light"           # Aqua is a light theme
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true

  # Brand mark in the top-left nav — the glass sphere, sized small next to the
  # wordmark. Icon is resolved through Hugo's asset pipeline (assets/img/...).
  [params.label]
    text = "Eventually Consistent"
    icon = "img/logo-sphere.png"
    iconHeight = 26

  [params.homeInfoParams]
    Title = "Eventually Consistent"
    Content = """
<div class="ec-hero"><img class="ec-hero-sphere" src="/img/logo-sphere.png" alt="Eventually Consistent — a glass sphere converging blue to green" width="160" height="160"></div>

This blog is where I write up the projects, the dead ends, and the tech I find worth explaining — cryptography, distributed systems, infrastructure-as-code, and developer tooling.

The name is a distributed-systems joke and a posture: opinions here converge over time.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/BigJiggity"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/img/favicon-16.png"
    favicon32x32 = "/img/favicon-32.png"
    apple_touch_icon = "/img/apple-touch-icon.png"
    theme_color = "#2f7fd6"        # Aqua blue — mobile browser chrome
    msapplication_TileColor = "#2f7fd6"
    disableHLJS = true             # use Hugo's Chroma highlighter

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true                  # allow raw HTML in posts when needed

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "Archive"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50
