<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1f2d4d" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbe5f4"/>
      <stop offset="1" stop-color="#cdd9ee"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- window panel -->
  <g filter="url(#panelShadow)">
    <rect x="48" y="40" width="1104" height="550" rx="18" fill="#ffffff"/>
  </g>
  <!-- title bar tint -->
  <path d="M48 58 a18 18 0 0 1 18 -18 h1068 a18 18 0 0 1 18 18 v26 h-1104 z" fill="#f2f5fb"/>
  <!-- traffic-light dots -->
  <circle cx="80" cy="65" r="7.5" fill="#ff5f57"/>
  <circle cx="106" cy="65" r="7.5" fill="#febc2e"/>
  <circle cx="132" cy="65" r="7.5" fill="#28c840"/>

  <!-- text composited separately via ImageMagick (renderer can't resolve fonts) -->

  <!-- stacked-container motif (teal) -->
  <g transform="translate(862,150)" stroke="#35c9a6" stroke-width="3.2" stroke-linejoin="round" fill="#35c9a6">
    <!-- bottom container -->
    <g fill="#35c9a6" fill-opacity="0.10">
      <rect x="0" y="150" width="230" height="78" rx="6"/>
    </g>
    <g stroke-opacity="0.85" stroke-width="2.4">
      <path d="M30 150 V228 M62 150 V228 M94 150 V228 M126 150 V228 M158 150 V228 M190 150 V228"/>
    </g>
    <rect x="210" y="172" width="8" height="34" rx="2" fill="none"/>

    <!-- middle container, offset -->
    <g fill="#35c9a6" fill-opacity="0.16">
      <rect x="44" y="78" width="230" height="64" rx="6"/>
    </g>
    <g stroke-opacity="0.9" stroke-width="2.4">
      <path d="M74 78 V142 M106 78 V142 M138 78 V142 M170 78 V142 M202 78 V142 M234 78 V142"/>
    </g>
    <rect x="252" y="96" width="8" height="28" rx="2" fill="none"/>

    <!-- top container, highlighted (the one that earns its keep) -->
    <g fill="#35c9a6" fill-opacity="0.28">
      <rect x="14" y="8" width="210" height="60" rx="6"/>
    </g>
    <g stroke-opacity="1" stroke-width="2.6">
      <path d="M44 8 V68 M74 8 V68 M104 8 V68 M134 8 V68 M164 8 V68 M194 8 V68"/>
    </g>
    <rect x="202" y="24" width="8" height="28" rx="2" fill="none"/>

    <!-- circuit trace tying the stack to a single node -->
    <g fill="none" stroke="#35c9a6" stroke-opacity="0.55" stroke-width="2.4" stroke-linecap="round">
      <path d="M-26 119 H-2 M-26 119 V196 H-2"/>
    </g>
    <circle cx="-26" cy="119" r="5" fill="#35c9a6" stroke="none"/>
  </g>
</svg>
